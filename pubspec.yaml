name: civic_pulse
description: "CivicPulse - Student educational metrics monitoring app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.2.3

  # Network
  dio: ^5.4.0
  pretty_dio_logger: ^1.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.1.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  syncfusion_flutter_pdfviewer: ^33.2.5
  photo_view: ^0.15.0

  # Forms & Input
  flutter_slidable: ^4.0.3
  image_picker: ^1.0.7
  file_picker: ^11.0.2

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  freezed_annotation: ^3.1.0

  # Platform-specific
  url_launcher: ^6.2.4
  share_plus: ^12.0.2

  # PDF Generation (for reports)
  pdf: ^3.10.7
  printing: ^5.12.0
  excel: ^4.0.3

  # Google Fonts
  google_fonts: ^8.1.0
  radar_chart_plus: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^4.0.3
  json_serializable: ^6.7.1
  freezed: ^3.2.5
  mockito: ^5.4.4

flutter:
  uses-material-design: true
